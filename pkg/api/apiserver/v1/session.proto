// Session API 定义，包含会话管理的 RPC 接口
syntax = "proto3";

package apiserver.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/ashwinyue/eino-show/pkg/api/apiserver/v1;apiserverv1";

// Session 会话
message Session {
    string id = 1;
    string title = 2;
    string description = 3;
    string agent_id = 4;
    SessionAgentConfig agent_config = 5;
    SessionContextConfig context_config = 6;
    google.protobuf.Timestamp created_at = 7;
    google.protobuf.Timestamp updated_at = 8;
}

// SessionAgentConfig 会话级别的 Agent 配置
message SessionAgentConfig {
    string agent_id = 1;
    string mode = 2;
    repeated string knowledge_bases = 3;
    double temperature = 4;
    int32 max_iterations = 5;
    bool web_search_enabled = 6;
}

// SessionContextConfig LLM 上下文管理配置
message SessionContextConfig {
    int32 max_messages = 1;
    int32 compression_threshold = 2;
    bool enable_context_compression = 3;
}

// CreateSessionRequest 创建会话请求
message CreateSessionRequest {
    string title = 1;
    string description = 2;
    string agent_id = 3;
    SessionAgentConfig agent_config = 4;
    SessionContextConfig context_config = 5;
}

// CreateSessionResponse 创建会话响应
message CreateSessionResponse {
    string id = 1;
    string title = 2;
    google.protobuf.Timestamp created_at = 3;
}

// GetSessionRequest 获取会话请求
message GetSessionRequest {
    string id = 1;
}

// GetSessionResponse 获取会话响应
message GetSessionResponse {
    Session session = 1;
}

// ListSessionsRequest 获取会话列表请求
message ListSessionsRequest {
    // 未来可添加分页参数
}

// ListSessionsResponse 获取会话列表响应
message ListSessionsResponse {
    repeated Session sessions = 1;
    int64 total = 2;
}

// UpdateSessionRequest 更新会话请求
message UpdateSessionRequest {
    string id = 1;
    optional string title = 2;
    optional string description = 3;
    optional SessionAgentConfig agent_config = 4;
    optional SessionContextConfig context_config = 5;
}

// UpdateSessionResponse 更新会话响应
message UpdateSessionResponse {
    string id = 1;
    string title = 2;
    google.protobuf.Timestamp updated_at = 3;
}

// DeleteSessionRequest 删除会话请求
message DeleteSessionRequest {
    string id = 1;
}

// DeleteSessionResponse 删除会话响应
message DeleteSessionResponse {
    bool success = 1;
    string message = 2;
}
