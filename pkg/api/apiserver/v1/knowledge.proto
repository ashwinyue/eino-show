// Knowledge API 定义，包含知识库管理的 RPC 接口
syntax = "proto3";

package apiserver.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/ashwinyue/eino-show/pkg/api/apiserver/v1;apiserverv1";

// KnowledgeBase 知识库
message KnowledgeBase {
    string id = 1;
    string name = 2;
    string description = 3;
    KnowledgeChunkingConfig chunking_config = 4;
    KnowledgeImageConfig image_processing_config = 5;
    string embedding_model_id = 6;
    string summary_model_id = 7;
    string rerank_model_id = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}

// KnowledgeChunkingConfig 文档分块配置
message KnowledgeChunkingConfig {
    int32 chunk_size = 1;
    int32 chunk_overlap = 2;
    repeated string split_markers = 3;
    bool keep_separator = 4;
}

// KnowledgeImageConfig 图像处理配置
message KnowledgeImageConfig {
    bool enable_multimodal = 1;
    string model_id = 2;
}

// Knowledge 知识项
message Knowledge {
    string id = 1;
    string knowledge_base_id = 2;
    string type = 3;
    string title = 4;
    string description = 5;
    string source = 6;
    string parse_status = 7;
    string enable_status = 8;
    string embedding_model_id = 9;
    string file_name = 10;
    string file_type = 11;
    google.protobuf.Timestamp created_at = 12;
    google.protobuf.Timestamp updated_at = 13;
}

// CreateKnowledgeBaseRequest 创建知识库请求
message CreateKnowledgeBaseRequest {
    string name = 1;
    string description = 2;
    KnowledgeChunkingConfig chunking_config = 3;
    KnowledgeImageConfig image_processing_config = 4;
    string embedding_model_id = 5;
    string summary_model_id = 6;
    string rerank_model_id = 7;
}

// CreateKnowledgeBaseResponse 创建知识库响应
message CreateKnowledgeBaseResponse {
    string id = 1;
    string name = 2;
    google.protobuf.Timestamp created_at = 3;
}

// GetKnowledgeBaseRequest 获取知识库请求
message GetKnowledgeBaseRequest {
    string id = 1;
}

// GetKnowledgeBaseResponse 获取知识库响应
message GetKnowledgeBaseResponse {
    KnowledgeBase knowledge_base = 1;
}

// ListKnowledgeBasesRequest 获取知识库列表请求
message ListKnowledgeBasesRequest {
    // 未来可添加分页参数
}

// ListKnowledgeBasesResponse 获取知识库列表响应
message ListKnowledgeBasesResponse {
    repeated KnowledgeBase knowledge_bases = 1;
    int64 total = 2;
}

// UpdateKnowledgeBaseRequest 更新知识库请求
message UpdateKnowledgeBaseRequest {
    string id = 1;
    optional string name = 2;
    optional string description = 3;
    optional KnowledgeChunkingConfig chunking_config = 4;
    optional KnowledgeImageConfig image_processing_config = 5;
    optional string embedding_model_id = 6;
    optional string summary_model_id = 7;
    optional string rerank_model_id = 8;
}

// UpdateKnowledgeBaseResponse 更新知识库响应
message UpdateKnowledgeBaseResponse {
    string id = 1;
    string name = 2;
    google.protobuf.Timestamp updated_at = 3;
}

// DeleteKnowledgeBaseRequest 删除知识库请求
message DeleteKnowledgeBaseRequest {
    string id = 1;
}

// DeleteKnowledgeBaseResponse 删除知识库响应
message DeleteKnowledgeBaseResponse {
    bool success = 1;
    string message = 2;
}

// GetKnowledgeStatsRequest 获取知识库统计请求
message GetKnowledgeStatsRequest {
    string id = 1;
}

// KnowledgeStatsResponse 知识库统计响应
message KnowledgeStatsResponse {
    int64 knowledge_count = 1;
    int64 chunk_count = 2;
}

// ListKnowledgesRequest 获取知识列表请求
message ListKnowledgesRequest {
    string kb_id = 1;
}

// ListKnowledgesResponse 获取知识列表响应
message ListKnowledgesResponse {
    repeated Knowledge knowledge = 1;
    int64 total = 2;
}

// DeleteKnowledgeRequest 删除知识项请求
message DeleteKnowledgeRequest {
    string id = 1;
}

// DeleteKnowledgeResponse 删除知识项响应
message DeleteKnowledgeResponse {
    bool success = 1;
    string message = 2;
}
