// eino-show gRPC 服务定义（示例）
// 只保留健康检查服务，其他 API 使用 HTTP + Go 原生类型
syntax = "proto3";

package apiserver.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "apiserver/v1/healthz.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/ashwinyue/eino-show/pkg/api/apiserver/v1;apiserverv1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "eino-show API";
        version: "1.0";
        description: "gRPC 服务示例，主要 API 使用 HTTP";
        contact: {
            name: "eino-show 项目";
            url: "https://github.com/ashwinyue/eino-show";
        };
        license: {
            name: "MIT License";
            url: "https://github.com/ashwinyue/eino-show/blob/master/LICENSE";
        };
    };
    schemes: HTTPS;
    consumes: "application/json";
    produces: "application/json";
};

// MiniBlog gRPC 服务（示例，仅保留健康检查）
service MiniBlog {
    // Healthz 健康检查
    rpc Healthz(google.protobuf.Empty) returns (HealthzResponse) {
        option (google.api.http) = {
            get: "/healthz",
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "服务健康检查";
            operation_id: "Healthz";
            tags: "服务治理";
        };
    }
}
