// eino-show API 定义，包含健康检查、用户管理、文章管理、Agent管理、会话管理和知识库管理的 RPC 接口
syntax = "proto3"; // 告诉编译器此文件使用什么版本的语法

package apiserver.v1;

// 提供用于定义 HTTP 映射的功能，比如通过 option (google.api.http) 实现 gRPC 到 HTTP 的映射
import "google/api/annotations.proto";
// 提供了一个标准的空消息类型 google.protobuf.Empty，适用于 RPC 方法不需要输入消息或输出消息的场景
import "google/protobuf/empty.proto";
// 定义当前服务所依赖的健康检查消息
import "apiserver/v1/healthz.proto";
// 定义当前服务所依赖的博客消息
import "apiserver/v1/post.proto";
// 定义当前服务所依赖的用户消息
import "apiserver/v1/user.proto";
// 定义当前服务所依赖的 Agent 消息
import "apiserver/v1/agent.proto";
// 定义当前服务所依赖的会话消息
import "apiserver/v1/session.proto";
// 定义当前服务所依赖的知识库消息
import "apiserver/v1/knowledge.proto";
// 为生成 OpenAPI 文档提供相关注释（如标题、版本、作者、许可证等信息）
import "protoc-gen-openapiv2/options/annotations.proto";

// 指定协议缓冲区文件生成的 Go 代码所在的包路径
// 包路径为：github.com/ashwinyue/eino-show/pkg/api/apiserver/v1, 别名为：v1
option go_package = "github.com/ashwinyue/eino-show/pkg/api/apiserver/v1;apiserverv1";

// OpenAPI 全局配置，提供详细配置信息，用于生成 OpenAPI 文档
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        // API名称
        title: "eino-show API";
        // API版本
        version: "1.0";
        // API 描述
        description: "";
        // 开发者的联系方式，包括项目名称、网址和电子邮件
        contact: {
            name: "eino-show 项目";
            url: "https://github.com/ashwinyue/eino-show";
            email: "stary99c@163.com";
        };
        // 可信息和链接（这里使用 MIT License）
        license: {
            name: "MIT License";
            url: "https://github.com/ashwinyue/eino-show/blob/master/LICENSE";
        };
    };
    //  指定访问协议为 HTTPS
    schemes: HTTPS;
    // 定义了服务的请求和响应的数据格式为 application/json
    consumes: "application/json";
    produces: "application/json";
};

// MiniBlog 定义了一个 MiniBlog RPC 服务
service MiniBlog {
    // Healthz 健康检查
    rpc Healthz(google.protobuf.Empty) returns (HealthzResponse) {
        // 通过 google.api.http 注释，指定 HTTP 方法为 GET、URL路径为 /healthz
        option (google.api.http) = {
            get: "/healthz",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            // 在 OpenAPI 文档中的接口简要描述，为“服务健康检查”
            summary: "服务健康检查";
            // 标识该操作的唯一ID，为“Healthz”
            operation_id: "Healthz";
            // 将该接口归类为“服务治理”
            tags: "服务治理";
        };
    }

    // Login 用户登录
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/login",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "用户登录";
            operation_id: "Login";
            description: "";
            tags: "用户管理";
        };
    }

    // RefreshToken 刷新令牌
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
        option (google.api.http) = {
          put: "/refresh-token",
          body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "刷新令牌";
            operation_id: "RefreshToken";
            description: "";
            tags: "用户管理";
        };
    }


    // ChangePassword 修改密码
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse) {
        option (google.api.http) = {
            put: "/v1/users/{userID}/change-password",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "修改密码";
            operation_id: "ChangePassword";
            tags: "用户管理";
        };
    }

    // CreateUser 创建用户
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
        option (google.api.http) = {
            post: "/v1/users",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建用户";
            operation_id: "CreateUser";
            tags: "用户管理";
        };
    }

    // UpdateUser 更新用户信息
    rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
        option (google.api.http) = {
            put: "/v1/users/{userID}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新用户信息";
            operation_id: "UpdateUser";
            tags: "用户管理";
        };
    }

    // DeleteUser 删除用户
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
        option (google.api.http) = {
            delete: "/v1/users/{userID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除用户";
            operation_id: "DeleteUser";
            tags: "用户管理";
        };
    }

    // GetUser 获取用户信息
    rpc GetUser(GetUserRequest) returns (GetUserResponse) {
        option (google.api.http) = {
            get: "/v1/users/{userID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取用户信息";
            operation_id: "GetUser";
            tags: "用户管理";
        };
    }

    // ListUser 列出所有用户
    rpc ListUser(ListUserRequest) returns (ListUserResponse) {
        option (google.api.http) = {
            get: "/v1/users",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "列出所有用户";
            operation_id: "ListUser";
            tags: "用户管理";
        };
    }

    // CreatePost 创建文章
    rpc CreatePost(CreatePostRequest) returns (CreatePostResponse) {
        option (google.api.http) = {
            post: "/v1/posts",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建文章";
            operation_id: "CreatePost";
            tags: "博客管理";
        };
    }

    // UpdatePost 更新文章
    rpc UpdatePost(UpdatePostRequest) returns (UpdatePostResponse) {
        // 将 UpdatePost 映射为 HTTP PUT 请求，并通过 URL /v1/posts/{postID} 访问
        // {postID} 是一个路径参数，grpc-gateway 会根据 postID 名称，将其解析并映射到
        // UpdatePostRequest 类型中相应的字段.
        // body: "*" 表示请求体中的所有字段都会映射到 UpdatePostRequest 类型。
        option (google.api.http) = {
            put: "/v1/posts/{postID}",
            body: "*",
        };

        // 提供用于生成 OpenAPI 文档的注解
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            // 在文档中简要描述此操作的功能：更新文章。
            summary: "更新文章";
            // 为此操作指定唯一标识符（UpdatePost），便于跟踪
            operation_id: "UpdatePost";
            // 将此操作归类到 "博客管理" 标签组，方便在 OpenAPI 文档中组织接口分组
            tags: "博客管理";
        };
    }

    // DeletePost 删除文章
    rpc DeletePost(DeletePostRequest) returns (DeletePostResponse) {
        option (google.api.http) = {
            delete: "/v1/posts",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除文章";
            operation_id: "DeletePost";
            tags: "博客管理";
        };
    }

    // GetPost 获取文章信息
    rpc GetPost(GetPostRequest) returns (GetPostResponse) {
        option (google.api.http) = {
            get: "/v1/posts/{postID}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取文章信息";
            operation_id: "GetPost";
            tags: "博客管理";
        };
    }

    // ListPost 列出所有文章
    rpc ListPost(ListPostRequest) returns (ListPostResponse) {
        option (google.api.http) = {
            get: "/v1/posts",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "列出所有文章";
            operation_id: "ListPost";
            tags: "博客管理";
        };
    }

    // ========== Agent 管理 ==========

    // ListAgents 获取 Agent 列表
    rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
        option (google.api.http) = {
            get: "/v1/custom-agents",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取 Agent 列表";
            operation_id: "ListAgents";
            tags: "Agent 管理";
        };
    }

    // GetAgent 获取 Agent 详情
    rpc GetAgent(GetAgentRequest) returns (GetAgentResponse) {
        option (google.api.http) = {
            get: "/v1/custom-agents/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取 Agent 详情";
            operation_id: "GetAgent";
            tags: "Agent 管理";
        };
    }

    // CreateAgent 创建 Agent
    rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse) {
        option (google.api.http) = {
            post: "/v1/custom-agents",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建 Agent";
            operation_id: "CreateAgent";
            tags: "Agent 管理";
        };
    }

    // UpdateAgent 更新 Agent
    rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse) {
        option (google.api.http) = {
            put: "/v1/custom-agents/{id}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新 Agent";
            operation_id: "UpdateAgent";
            tags: "Agent 管理";
        };
    }

    // DeleteAgent 删除 Agent
    rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse) {
        option (google.api.http) = {
            delete: "/v1/custom-agents/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除 Agent";
            operation_id: "DeleteAgent";
            tags: "Agent 管理";
        };
    }

    // ListBuiltinAgents 获取内置 Agent 列表
    rpc ListBuiltinAgents(ListBuiltinAgentsRequest) returns (ListBuiltinAgentsResponse) {
        option (google.api.http) = {
            get: "/v1/agents/builtin",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取内置 Agent 列表";
            operation_id: "ListBuiltinAgents";
            tags: "Agent 管理";
        };
    }

    // ========== 会话管理 ==========

    // CreateSession 创建会话
    rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse) {
        option (google.api.http) = {
            post: "/v1/sessions",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建会话";
            operation_id: "CreateSession";
            tags: "会话管理";
        };
    }

    // GetSession 获取会话详情
    rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
        option (google.api.http) = {
            get: "/v1/sessions/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取会话详情";
            operation_id: "GetSession";
            tags: "会话管理";
        };
    }

    // ListSessions 获取会话列表
    rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse) {
        option (google.api.http) = {
            get: "/v1/sessions",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取会话列表";
            operation_id: "ListSessions";
            tags: "会话管理";
        };
    }

    // UpdateSession 更新会话
    rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse) {
        option (google.api.http) = {
            put: "/v1/sessions/{id}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新会话";
            operation_id: "UpdateSession";
            tags: "会话管理";
        };
    }

    // DeleteSession 删除会话
    rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {
        option (google.api.http) = {
            delete: "/v1/sessions/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除会话";
            operation_id: "DeleteSession";
            tags: "会话管理";
        };
    }

    // ========== 知识库管理 ==========

    // CreateKnowledgeBase 创建知识库
    rpc CreateKnowledgeBase(CreateKnowledgeBaseRequest) returns (CreateKnowledgeBaseResponse) {
        option (google.api.http) = {
            post: "/v1/knowledge-bases",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "创建知识库";
            operation_id: "CreateKnowledgeBase";
            tags: "知识库管理";
        };
    }

    // GetKnowledgeBase 获取知识库详情
    rpc GetKnowledgeBase(GetKnowledgeBaseRequest) returns (GetKnowledgeBaseResponse) {
        option (google.api.http) = {
            get: "/v1/knowledge-bases/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取知识库详情";
            operation_id: "GetKnowledgeBase";
            tags: "知识库管理";
        };
    }

    // ListKnowledgeBases 获取知识库列表
    rpc ListKnowledgeBases(ListKnowledgeBasesRequest) returns (ListKnowledgeBasesResponse) {
        option (google.api.http) = {
            get: "/v1/knowledge-bases",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取知识库列表";
            operation_id: "ListKnowledgeBases";
            tags: "知识库管理";
        };
    }

    // UpdateKnowledgeBase 更新知识库
    rpc UpdateKnowledgeBase(UpdateKnowledgeBaseRequest) returns (UpdateKnowledgeBaseResponse) {
        option (google.api.http) = {
            put: "/v1/knowledge-bases/{id}",
            body: "*",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "更新知识库";
            operation_id: "UpdateKnowledgeBase";
            tags: "知识库管理";
        };
    }

    // DeleteKnowledgeBase 删除知识库
    rpc DeleteKnowledgeBase(DeleteKnowledgeBaseRequest) returns (DeleteKnowledgeBaseResponse) {
        option (google.api.http) = {
            delete: "/v1/knowledge-bases/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除知识库";
            operation_id: "DeleteKnowledgeBase";
            tags: "知识库管理";
        };
    }

    // GetKnowledgeStats 获取知识库统计
    rpc GetKnowledgeStats(GetKnowledgeStatsRequest) returns (KnowledgeStatsResponse) {
        option (google.api.http) = {
            get: "/v1/knowledge-bases/{id}/stats",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取知识库统计";
            operation_id: "GetKnowledgeStats";
            tags: "知识库管理";
        };
    }

    // ListKnowledges 获取知识列表
    rpc ListKnowledges(ListKnowledgesRequest) returns (ListKnowledgesResponse) {
        option (google.api.http) = {
            get: "/v1/knowledge-bases/{kb_id}/knowledge",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "获取知识列表";
            operation_id: "ListKnowledges";
            tags: "知识库管理";
        };
    }

    // DeleteKnowledge 删除知识
    rpc DeleteKnowledge(DeleteKnowledgeRequest) returns (DeleteKnowledgeResponse) {
        option (google.api.http) = {
            delete: "/v1/knowledge/{id}",
        };

        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "删除知识";
            operation_id: "DeleteKnowledge";
            tags: "知识库管理";
        };
    }
}
