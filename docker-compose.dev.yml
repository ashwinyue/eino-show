# eino-show 开发环境配置
# 只启动基础设施服务，app 和 frontend 在本地运行

services:
  postgres:
    image: paradedb/paradedb:v0.18.9-pg17
    container_name: eino-show-postgres-dev
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-einoshow}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-einoshow1234}
      - POSTGRES_DB=${DB_NAME:-einoshow}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
      # 初始化脚本
      - ./docker/postgres/init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - eino-show-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-einoshow}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 1m

  redis:
    image: redis:7.0-alpine
    container_name: eino-show-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    networks:
      - eino-show-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: eino-show-minio-dev
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    command: server --console-address ":9001" /data
    volumes:
      - minio-data-dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - eino-show-network-dev
    profiles:
      - minio
      - full

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: eino-show-qdrant-dev
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"
      - "${QDRANT_PORT:-6334}:6334"
    volumes:
      - qdrant-data-dev:/qdrant/storage
    networks:
      - eino-show-network-dev
    restart: unless-stopped
    profiles:
      - qdrant
      - full

  neo4j:
    image: neo4j:2025.10.1
    container_name: eino-show-neo4j-dev
    volumes:
      - neo4j-data-dev:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4JLABS_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always
    networks:
      - eino-show-network-dev
    profiles:
      - neo4j
      - full

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: eino-show-jaeger-dev
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    volumes:
      - jaeger-data-dev:/var/lib/jaeger
    networks:
      - eino-show-network-dev
    restart: unless-stopped
    profiles:
      - jaeger
      - full

networks:
  eino-show-network-dev:
    driver: bridge

volumes:
  postgres-data-dev:
  redis-data-dev:
  minio-data-dev:
  qdrant-data-dev:
  neo4j-data-dev:
  jaeger-data-dev:
